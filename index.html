<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    window.TrackJS && TrackJS.install({ 
      token: "881eb4d7363e4429b3c324c548f83a94"
      // for more configuration options, see https://docs.trackjs.com
    });
  </script>
  
  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish
    
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      
      try {
        if (firstNum.trim() === '' || secondNum.trim() === '') {
          throw new ValidationError('Inputs cannot be left blank.');
        }

        if (isNaN(firstNum) || isNaN(secondNum)) {
          throw new ValidationError('Calculator only accepts numeric inputs.');
        }

        if (operator === '/' && Number(secondNum) === 0) {
          throw new DivideByZeroError('Division by zero is mathematically undefined.');
        }

        output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);

      } catch (error) {
        if (error instanceof ValidationError || error instanceof DivideByZeroError) {
          console.error(`[Caught Application Error] Type: ${error.name} | Message: ${error.message}`);
          output.innerHTML = `⚠️ Error: ${error.message}`;
        } else {
          console.error(`[Unexpected Error]: ${error.message}`);
          output.innerHTML = "An unexpected error occurred.";
        }
      } finally {
        console.log('%c Calculator attempt finished processing. ', 'color: #00bcd4; font-weight: bold;');
      }
    });

    class ValidationError extends Error {
      constructor(message) {
        super(message);
        this.name = "ValidationError";
      }
    }

    class DivideByZeroError extends Error {
      constructor(message) {
        super(message);
        this.name = "DivideByZeroError";
      }
    }

    const testArray = [
      { course: 'CSE 110', lab: 9, topic: 'Error Handling' },
      { course: 'CSE 110', lab: 10, topic: 'CI/CD Pipelines' }
    ];

    errorBtns[0].addEventListener('click', () => console.log('Console Log Demo: This is a standard log output.'));
    errorBtns[1].addEventListener('click', () => console.error('Console Error Demo: Triggering a simulated error log.'));
    errorBtns[2].addEventListener('click', () => console.count('Click Counter'));
    errorBtns[3].addEventListener('click', () => console.warn('Console Warn Demo: Beware of unhandled promises!'));
    errorBtns[4].addEventListener('click', () => {
      const x = 5, y = 10;
      console.assert(x > y, `Assertion Failed: ${x} is not greater than ${y}`);
    });
    errorBtns[5].addEventListener('click', () => console.clear());
    errorBtns[6].addEventListener('click', () => console.dir(document.querySelector('form')));
    errorBtns[7].addEventListener('click', () => console.dirxml(document.querySelector('fieldset')));

    const groupLabel = 'Lab 9 Step Progress';
    errorBtns[8].addEventListener('click', () => {
      console.group(groupLabel);
      console.log('Validating UI bindings...');
      console.log('Injecting TrackJS Telemetry snippet...');
    });
    errorBtns[9].addEventListener('click', () => console.groupEnd(groupLabel));

    errorBtns[10].addEventListener('click', () => console.table(testArray));

    errorBtns[11].addEventListener('click', () => console.time('Execution Timer'));
    errorBtns[12].addEventListener('click', () => console.timeEnd('Execution Timer'));

    errorBtns[13].addEventListener('click', () => {
      const deepTrace = () => { deeperTrace(); };
      const deeperTrace = () => { console.trace('Trace Log Stack:'); };
      deepTrace();
    });

    errorBtns[14].addEventListener('click', () => {
      console.log(forcefullyCrashApplicationWithUndefinedVariable);
    });

    window.addEventListener('error', (event) => {
      console.log('%c [Global Error Intercepted Successfully] ', 'background: #b00020; color: #fff; padding: 2px 5px;');
      console.log(`Message: ${event.message}`);
      console.log(`Source: ${event.filename} at line ${event.lineno}`);
    });
  </script>
</body>

</html>
